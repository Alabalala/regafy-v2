name: Keep Supabase Alive

on:
 schedule:
  - cron: "0 8 * * *"
 workflow_dispatch:

jobs:
 ping:
  runs-on: ubuntu-latest
  steps:
   - name: Ping Supabase
     run: |
      curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/" \
      -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
      -o /dev/null -w "%{http_code}"
